services:
  db:
    image: postgres:16-alpine
    container_name: iugm_postgres_db
    restart: always
    # Charge le fichier d'environnement de Next.js pour Docker.
    # NB : pas de bloc "environment:" avec ${...} ici — Compose interpolerait
    # depuis un fichier .env (inexistant) et écraserait ces valeurs avec du vide.
    env_file:
      - .env.local
    ports:
      - "5432:5432"
    volumes:
      - iugm_db_data:/var/lib/postgresql/data

volumes:
  iugm_db_data: