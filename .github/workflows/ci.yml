name: CI - Verification & Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    # Indique à GitHub Actions que le projet est dans le dossier "iugm"
    defaults:
      run:
        working-directory: ./iugm

    steps:
      - name: 1. Récupérer le code source
        uses: actions/checkout@v4

      - name: 2. Configurer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 3. Installer les dépendances
        run: npm install

      - name: 4. Générer le client Prisma
        run: npx prisma generate

      - name: 5. Vérifier les types TypeScript
        run: npx tsc --noEmit

      - name: 6. Vérifier la compilation Next.js (Build)
        run: npm run build