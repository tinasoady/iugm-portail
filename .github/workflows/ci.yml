name: CI - Verification & Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Récupérer le code source
        uses: actions/checkout@v4

      - name: 2. Configurer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 3. Installer les dépendances
        run: npm ci

      - name: 4. Vérifier les types TypeScript
        run: npx tsc --noEmit

      - name: 5. Vérifier la compilation Next.js (Build)
        run: npm run build